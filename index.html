<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weino — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <header class="admin-topbar">
    <h1 data-i18n="brand">Admin</h1>
    <div id="header-session" class="header-session hidden">
      <span id="session-info" class="session-info"></span>
      <button type="button" class="secondary sm" id="btn-logout" data-i18n="logout">Log out</button>
    </div>
    <div class="lang-switch">
      <span class="lang-label" data-i18n="lang_pick">Language</span>
      <button type="button" id="btn-lang-en" class="active" aria-pressed="true">English</button>
      <button type="button" id="btn-lang-ar" aria-pressed="false">العربية</button>
    </div>
  </header>

  <div id="screen-login" class="screen-login">
    <div class="login-card card">
      <h2 data-i18n="login_title">Sign in</h2>
      <p class="intro" data-i18n="login_intro"></p>
      <form id="login-form">
        <div class="form-row">
          <label for="login-api" data-i18n="login_api">API base URL</label>
          <input id="login-api" type="url" autocomplete="off" placeholder="https://…/api/v1" />
        </div>
        <div class="form-row">
          <label for="login-user" data-i18n="login_user">Username</label>
          <input id="login-user" name="username" autocomplete="username" required />
        </div>
        <div class="form-row">
          <label for="login-pass" data-i18n="login_pass">Password</label>
          <input id="login-pass" type="password" name="password" autocomplete="current-password" required />
        </div>
        <div class="actions">
          <button type="submit" class="primary" data-i18n="login_submit">Sign in</button>
        </div>
      </form>
      <div id="login-error" class="msg-error" role="alert"></div>
    </div>
  </div>

  <div id="screen-app" class="hidden">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <nav id="admin-nav">
          <button type="button" class="nav-route" data-route="dashboard" data-perm="dashboard" data-hash="#dashboard" data-i18n="nav_dashboard"></button>
          <button type="button" class="nav-route" data-route="users" data-perm="users" data-hash="#users" data-i18n="nav_users"></button>
          <button type="button" class="nav-route" data-route="bookings" data-perm="bookings_admin" data-hash="#bookings" data-i18n="nav_bookings"></button>
          <button type="button" class="nav-route" data-route="bookingtools" data-perm="bookings_admin" data-hash="#bookingtools" data-i18n="nav_bookingtools"></button>
          <button type="button" class="nav-route" data-route="matches" data-perm="matches" data-hash="#matches" data-i18n="nav_matches"></button>
          <button type="button" class="nav-route" data-route="categories" data-perm="categories" data-hash="#categories" data-i18n="nav_categories"></button>
          <button type="button" class="nav-route" data-route="locations" data-perm="locations" data-hash="#locations/countries" data-i18n="nav_locations"></button>
          <button type="button" class="nav-route" data-route="appconfig" data-perm="app_config" data-hash="#appconfig" data-i18n="nav_appconfig"></button>
          <button type="button" class="nav-route" data-route="platformfees" data-perm="platform_fees" data-hash="#platformfees" data-i18n="nav_platformfees"></button>
          <button type="button" class="nav-route" data-route="tickets" data-perm="tickets" data-hash="#tickets" data-i18n="nav_tickets"></button>
          <button type="button" class="nav-route" data-route="notifications" data-perm="notifications" data-hash="#notifications" data-i18n="nav_notifications"></button>
          <button type="button" class="nav-route" data-route="professionals" data-perm="professionals" data-hash="#professionals" data-i18n="nav_professionals"></button>
          <button type="button" class="nav-route" data-route="accounts" data-perm="accounts" data-hash="#accounts" data-i18n="nav_accounts"></button>
        </nav>
      </aside>
      <main id="admin-main" class="admin-main"></main>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="js/i18n.js"></script>
  <script src="js/platformFeesInvoiceExport.js"></script>
  <script src="js/admin-core.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
